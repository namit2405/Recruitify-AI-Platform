      /* Initial loading screen styles */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      
      @media (prefers-color-scheme: dark) {
        #initial-loader {
          background: #030712;
        }
        #initial-loader .loader-text {
          color: #f9fafb !important;
        }
        #initial-loader .loader-subtext {
          color: #9ca3af !important;
        }
      }
      
      .loader-content {
        text-align: center;
      }
      
      .loader-icon {
        width: 64px;
        height: 64px;
        background: #2563eb;
        border-radius: 16px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
      }
      
      .loader-icon svg {

      }
      
      .loader-text {
        font-size: 28px;
        font-weight: 700;
        color: #111827;
        margin-bottom: 24px;
      }
      
      .loader-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      
      .loader-dot {
        width: 8px;
        height: 8px;
        background: #2563eb;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }
      
      .loader-dot:nth-child(1) { animation-delay: -0.32s; }
      .loader-dot:nth-child(2) { animation-delay: -0.16s; }
      
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
      
      .loader-subtext {
        font-size: 14px;
        color: #6b7280;
      }
      
      .fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
