services:
  # Django Backend
  - type: web
    name: recruitify-backend
    env: python
    region: oregon
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: |
      cd backend
      daphne -b 0.0.0.0 -p $PORT recruitify_backend.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: recruitify-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: recruitify-redis
          property: connectionString

  # PostgreSQL Database
databases:
  - name: recruitify-db
    databaseName: recruitify
    user: recruitify
    region: oregon

  # Redis for Channels
  - name: recruitify-redis
    region: oregon
    plan: starter
