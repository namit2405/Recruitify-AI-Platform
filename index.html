<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recruitify Management Platform</title>
    <style>
      /* Initial loading screen styles */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      
      @media (prefers-color-scheme: dark) {
        #initial-loader {
          background: #111827;
        }
        #initial-loader .loader-text {
          color: #f9fafb !important;
        }
        #initial-loader .loader-subtext {
          color: #9ca3af !important;
        }
        #initial-loader .logo-light { display: none; }
        #initial-loader .logo-dark  { display: block; }
      }
      
      @media (prefers-color-scheme: light) {
        #initial-loader .logo-light { display: block; }
        #initial-loader .logo-dark  { display: none; }
      }
      
      .loader-content {
        text-align: center;
      }
      
      .loader-logo {
        margin: 0 auto 24px;
        height: 96px;
        width: auto;
      }

      /* default: show light, hide dark */
      .logo-dark  { display: none; }
      .logo-light { display: block; }
      
      .loader-text {
        font-size: 28px;
        font-weight: 700;
        color: #111827;
        margin-bottom: 24px;
      }
      
      .loader-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      
      .loader-dot {
        width: 8px;
        height: 8px;
        background: #2563eb;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }
      
      .loader-dot:nth-child(1) { animation-delay: -0.32s; }
      .loader-dot:nth-child(2) { animation-delay: -0.16s; }
      
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
      
      .loader-subtext {
        font-size: 14px;
        color: #6b7280;
      }
      
      .fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-JAKjhPm7.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/query-BLDgEyxv.js">
    <link rel="modulepreload" crossorigin href="/assets/router-zNuoXdnr.js">
    <link rel="modulepreload" crossorigin href="/assets/ui-y9qqgguj.js">
    <link rel="stylesheet" crossorigin href="/assets/index-BQNe2kXm.css">
  </head>
  <body>
    <!-- Initial Loading Screen -->
    <div id="initial-loader">
      <div class="loader-content">
        <img src="/images/Page, Features-dark.png" alt="Recruitify" class="loader-logo logo-dark" />
        <img src="/images/Page-light.png" alt="Recruitify" class="loader-logo logo-light" />
        <h1 class="loader-text">Recruitify</h1>
        <div class="loader-dots">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
        <p class="loader-subtext">Loading your workspace...</p>
      </div>
    </div>
    
    <div id="root"></div>
    <script>
      // Remove initial loader once React app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function() {
              loader.remove();
            }, 300);
          }
        }, 500);
      });
    </script>
  </body>
</html>
